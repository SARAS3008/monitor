<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ComfyUI Task Monitor Enhanced v3</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #0b1020; color: #e8eefc; }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; margin-bottom: 16px; }
    .card { background: #131a2e; border: 1px solid #26304e; border-radius: 16px; padding: 16px; box-shadow: 0 8px 24px rgba(0,0,0,.2); }
    .title { font-size: 14px; color: #9fb1df; margin-bottom: 8px; }
    .value { font-size: 28px; font-weight: 700; }
    .muted { color: #9fb1df; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #26304e; font-size: 14px; vertical-align: top; }
    .two { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .success { background: rgba(40, 167, 69, .18); color: #75e28d; }
    .failed, .interrupted { background: rgba(220, 53, 69, .18); color: #ff8b98; }
    .running { background: rgba(0, 123, 255, .18); color: #7db7ff; }
    .queued, .submitted { background: rgba(255, 193, 7, .18); color: #ffd76b; }
    .toolbar { display: flex; gap: 8px; margin: 12px 0 20px; flex-wrap: wrap; }
    input, select, button { background: #0e1528; color: #e8eefc; border: 1px solid #26304e; border-radius: 10px; padding: 10px 12px; }
    button { cursor: pointer; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0e1528; padding: 12px; border-radius: 12px; border: 1px solid #26304e; }
    .warn { color: #ffd76b; font-size: 13px; }
    .small { font-size: 12px; }
    .runs-grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap:8px; margin-top:12px; }
    @media (max-width: 1100px) { .grid, .two { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="wrap">
  <h1>ComfyUI Task Monitor Enhanced v3</h1>
  <div class="muted">任务监控、批量运行拆分、错误聚合、工作流统计</div>
  <div id="notice" class="warn" style="margin-top:8px;"></div>
  <div class="grid" id="overview"></div>

  <div class="two">
    <div class="card">
      <div class="title">任务列表</div>
      <div class="toolbar">
        <select id="statusFilter">
          <option value="">全部状态</option>
          <option value="queued">queued</option>
          <option value="running">running</option>
          <option value="success">success</option>
          <option value="failed">failed</option>
          <option value="interrupted">interrupted</option>
        </select>
        <input id="workflowFilter" placeholder="workflow_name" />
        <input id="modelFilter" placeholder="model_name" />
        <button onclick="loadTasks()">筛选</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>prompt_id</th>
            <th>workflow</th>
            <th>model</th>
            <th>type</th>
            <th>runs</th>
            <th>status</th>
            <th>progress</th>
          </tr>
        </thead>
        <tbody id="tasksBody"></tbody>
      </table>
    </div>

    <div class="card">
      <div class="title">错误聚合</div>
      <div id="errors"></div>
    </div>
  </div>

  <div class="card" style="margin-top:16px;">
    <div class="title">任务详情</div>
    <div id="detail" class="muted">点击任务 ID 查看详情</div>
  </div>

  <div class="card" style="margin-top:16px;">
    <div class="title">调试信息</div>
    <pre id="debug">loading...</pre>
  </div>
</div>

<script>
function badge(status) { return `<span class="badge ${status}">${status || '-'}</span>`; }
async function getJSON(url, opt) { const r = await fetch(url, opt); if (!r.ok) throw new Error(url + ' -> ' + r.status); return await r.json(); }
function setNotice(text) { document.getElementById('notice').textContent = text || ''; }

async function loadOverview() {
  const [overview, status] = await Promise.all([getJSON('/task_monitor/stats/overview'), getJSON('/task_monitor/status')]);
  const successRate = overview.total_count ? ((overview.success_count || 0) / overview.total_count * 100).toFixed(1) + '%' : '0%';
  document.getElementById('overview').innerHTML = [
    ['24h 请求数', overview.total_count || 0],
    ['24h 成功率', successRate],
    ['运行中', overview.running_count || 0],
    ['排队中', status.memory?.queue_remaining ?? overview.queued_count ?? 0],
    ['总批量次数', overview.total_requested_runs || 0],
    ['已完成子执行', overview.completed_runs || 0],
  ].map(([k, v]) => `<div class="card"><div class="title">${k}</div><div class="value">${v}</div></div>`).join('');

  const logs = (status.memory?.debug_log || []).slice(-12).join('\n');
  document.getElementById('debug').textContent = JSON.stringify({
    db_path: status.db_path,
    current_prompt_id: status.memory?.current_prompt_id,
    current_node_id: status.memory?.current_node_id,
    current_node_type: status.memory?.current_node_type,
    queue_remaining: status.memory?.queue_remaining,
    latest_error: status.memory?.latest_error,
    cached_prompt_count: status.memory?.cached_prompt_count,
    last_submission_body: status.memory?.last_submission_body,
  }, null, 2) + '\n\nRecent logs:\n' + logs;

  const repeatGuess = status.memory?.last_submission_body?.repeat_guess;
  if ((overview.total_count || 0) === 0) {
    setNotice('当前还没有采集到任务。先运行一次工作流，再刷新本页。');
  } else if (!repeatGuess || repeatGuess === 1) {
    setNotice('当前已支持子执行拆分；如果右上角运行次数仍未识别，可在任务详情里手动设置 repeat_count。');
  } else {
    setNotice('已识别本次批量次数并拆分为子执行。');
  }
}

async function loadTasks() {
  const status = document.getElementById('statusFilter').value;
  const workflow = document.getElementById('workflowFilter').value;
  const model = document.getElementById('modelFilter').value;
  const qs = new URLSearchParams();
  if (status) qs.set('status', status);
  if (workflow) qs.set('workflow_name', workflow);
  if (model) qs.set('model_name', model);
  qs.set('limit', '30');
  const data = await getJSON('/task_monitor/tasks?' + qs.toString());
  document.getElementById('tasksBody').innerHTML = (data.items || []).map(item => `
    <tr>
      <td><a href="#" onclick="loadDetail('${item.prompt_id}');return false;">${item.prompt_id || '-'}</a></td>
      <td>${item.workflow_name || '-'}</td>
      <td>${item.model_name || '-'}</td>
      <td>${item.task_type || '-'}</td>
      <td>${item.completed_runs || 0}/${item.repeat_count || 1}${item.failed_runs ? ` 失败 ${item.failed_runs}` : ''}</td>
      <td>${badge(item.status)}</td>
      <td>${item.progress_value ?? '-'} / ${item.progress_max ?? '-'} ${item.progress_percent ? '(' + item.progress_percent + '%)' : ''}<div class="small muted">run ${item.current_run_index || '-'} duration: ${item.duration_ms ?? '-'}</div></td>
    </tr>
  `).join('') || '<tr><td colspan="7" class="muted">暂无任务</td></tr>';
}

async function loadErrors() {
  const data = await getJSON('/task_monitor/errors?limit=10');
  document.getElementById('errors').innerHTML = (data.items || []).map(item => `
    <div style="padding:10px 0;border-bottom:1px solid #26304e;">
      <div><strong>${item.error_message}</strong></div>
      <div class="muted">${item.workflow_name} / ${item.error_node_type}</div>
      <div class="muted">次数：${item.count}，最近：${item.last_seen_at || '-'}</div>
    </div>
  `).join('') || '<div class="muted">暂无错误</div>';
}

async function setRepeatCount(promptId) {
  const v = prompt('输入要拆分的子执行数量，例如 4');
  if (!v) return;
  const repeat_count = parseInt(v, 10);
  if (!repeat_count || repeat_count < 1) return alert('请输入大于等于 1 的整数');
  await getJSON('/task_monitor/tasks/' + encodeURIComponent(promptId) + '/repeat_count', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({repeat_count})
  });
  await loadTasks();
  await loadDetail(promptId);
  await loadOverview();
}

async function loadDetail(promptId) {
  const data = await getJSON('/task_monitor/tasks/' + encodeURIComponent(promptId));
  const task = data.task || {};
  const events = data.events || [];
  const runs = data.runs || [];
  document.getElementById('detail').innerHTML = `
    <div style="margin-bottom:12px; display:grid; grid-template-columns: repeat(2, minmax(240px, 1fr)); gap:8px;">
      <div><strong>prompt_id:</strong> ${task.prompt_id || '-'}</div>
      <div><strong>status:</strong> ${badge(task.status)}</div>
      <div><strong>workflow:</strong> ${task.workflow_name || '-'}</div>
      <div><strong>model:</strong> ${task.model_name || '-'}</div>
      <div><strong>task_type:</strong> ${task.task_type || '-'}</div>
      <div><strong>repeat_count:</strong> ${task.repeat_count || 1} <button onclick="setRepeatCount('${task.prompt_id}')">手动设置</button></div>
      <div><strong>batch_size:</strong> ${task.batch_size || '-'}</div>
      <div><strong>queue_position:</strong> ${task.queue_position ?? '-'}</div>
      <div><strong>completed_runs:</strong> ${task.completed_runs || 0}</div>
      <div><strong>failed_runs:</strong> ${task.failed_runs || 0}</div>
      <div><strong>current_run_index:</strong> ${task.current_run_index || '-'}</div>
      <div><strong>duration:</strong> ${task.duration_ms ?? '-'}</div>
      <div><strong>error:</strong> ${task.error_message || '-'}</div>
    </div>
    <div class="title">子执行</div>
    <div class="runs-grid">
      ${runs.map(r => `<div class="card"><div><strong>Run #${r.run_index}</strong> ${badge(r.status)}</div><div class="small muted">node: ${r.current_node_id || '-'} ${r.current_node_type || ''}</div><div class="small muted">progress: ${r.progress_value ?? '-'} / ${r.progress_max ?? '-'} ${r.progress_percent ? '(' + r.progress_percent + '%)' : ''}</div><div class="small muted">duration: ${r.duration_ms ?? '-'}</div><div class="small muted">error: ${r.error_message || '-'}</div></div>`).join('') || '<div class="muted">暂无子执行</div>'}
    </div>
    <div class="title" style="margin-top:12px;">事件时间线</div>
    <pre>${events.map(e => `${e.created_at}  [${e.event_type}] node=${e.node_id || '-'} ${e.node_type || ''} progress=${e.progress_value ?? '-'} / ${e.progress_max ?? '-'}`).join('\n')}</pre>
  `;
}

async function boot() {
  try { await Promise.all([loadOverview(), loadTasks(), loadErrors()]); } catch (e) { setNotice('接口请求失败：' + e.message); }
  setInterval(loadOverview, 5000); setInterval(loadTasks, 5000); setInterval(loadErrors, 10000);
}
boot();
</script>
</body>
</html>
